server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Service worker & manifest — MUST appear before the general asset
    # caching block, because nginx evaluates regex locations top-down and
    # the first match wins.  A stale SW = a stale (broken) app.
    location ~* /(sw|serviceworker)\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { application/manifest+json webmanifest; }
    }

    # Public pages are prerendered to real HTML (SEO); everything else falls
    # back to the neutral SPA shell 200.html — NOT index.html, which now
    # contains the prerendered landing page and would flash on deep links.
    location / {
        try_files $uri $uri/ /200.html;
    }

    # Aggressive caching for hashed assets (SW excluded above)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
